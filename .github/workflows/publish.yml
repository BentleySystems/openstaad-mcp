name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build MCPB bundle
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install -e ".[build]"

      - name: Build with PyInstaller
        run: pyinstaller mcpb/openstaad-mcp.spec --noconfirm

      - name: Package MCPB bundle
        shell: pwsh
        run: |
          npm install -g @anthropic-ai/mcpb
          New-Item -ItemType Directory -Path mcpb-staging -Force
          Copy-Item dist/openstaad-mcp.exe mcpb-staging/
          Copy-Item mcpb/manifest.json mcpb-staging/
          Copy-Item -Path assets -Destination mcpb-staging/ -Recurse
          Copy-Item -Path LICENSE.md -Destination mcpb-staging/
          Copy-Item -Path README.md -Destination mcpb-staging/
          mcpb pack mcpb-staging/ openstaad-mcp.mcpb

      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: openstaad-mcp-mcpb
          path: openstaad-mcp.mcpb

      - name: Upload MCPB to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" openstaad-mcp.mcpb --clobber

  publish-mcp-registry:
    name: Publish to MCP Registry
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Download MCPB artifact
        uses: actions/download-artifact@v4
        with:
          name: openstaad-mcp-mcpb

      - name: Compute SHA-256 of MCPB
        id: sha
        run: echo "hash=$(sha256sum openstaad-mcp.mcpb | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update server.json with version and hash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          TAG=${{ github.event.release.tag_name }}
          jq --arg v "$VERSION" \
             --arg url "https://github.com/BentleySystems/openstaad-mcp/releases/download/${TAG}/openstaad-mcp.mcpb" \
             --arg hash "${{ steps.sha.outputs.hash }}" \
             '.version = $v | .packages[0].identifier = $url | .packages[0].fileSha256 = $hash' \
             server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
