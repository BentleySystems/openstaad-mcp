name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build MCPB bundle
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install -e ".[build]"

      - name: Build with PyInstaller
        run: pyinstaller mcpb/openstaad-mcp.spec --noconfirm

      - name: Package MCPB bundle
        shell: pwsh
        run: |
          npm install -g @anthropic-ai/mcpb
          New-Item -ItemType Directory -Path mcpb-staging -Force
          Copy-Item dist/openstaad-mcp.exe mcpb-staging/
          Copy-Item mcpb/manifest.json mcpb-staging/
          Copy-Item -Path assets -Destination mcpb-staging/ -Recurse
          Copy-Item -Path LICENSE.md -Destination mcpb-staging/
          Copy-Item -Path README.md -Destination mcpb-staging/
          mcpb pack mcpb-staging/ openstaad-mcp.mcpb

      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: openstaad-mcp-mcpb
          path: openstaad-mcp.mcpb

      - name: Upload MCPB to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" openstaad-mcp.mcpb --clobber
